apiVersion: apps/v1
kind: Deployment
metadata:
  name: he-gateway
  namespace: aml-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: he-gateway
  template:
    metadata:
      labels:
        app: he-gateway
    spec:
      containers:
        - name: he-gateway
          image: localhost/aml-he-gateway:phase6
          imagePullPolicy: IfNotPresent
          env:
            - name: HE_GATEWAY_BIND
              value: 0.0.0.0:8082
          ports:
            - containerPort: 8082
              name: http
          readinessProbe:
            httpGet:
              path: /health
              port: 8082
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8082
            initialDelaySeconds: 15
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: he-gateway
  namespace: aml-system
spec:
  selector:
    app: he-gateway
  ports:
    - name: http
      port: 8082
      targetPort: 8082
