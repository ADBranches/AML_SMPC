apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: aml-ingress
  namespace: aml-system
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /$2
spec:
  rules:
    - http:
        paths:
          - path: /regulator(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: regulator-api
                port:
                  number: 8085
          - path: /encryption(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: encryption-service
                port:
                  number: 8081
          - path: /zk(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: zk-prover
                port:
                  number: 8084
