global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ['prometheus:9090']

  - job_name: encryption-service
    metrics_path: /health
    static_configs:
      - targets: ['encryption-service.aml-system.svc.cluster.local:8081']

  - job_name: he-gateway
    metrics_path: /health
    static_configs:
      - targets: ['he-gateway.aml-system.svc.cluster.local:8082']

  - job_name: smpc-runtime
    metrics_path: /health
    static_configs:
      - targets: ['smpc-runtime.aml-system.svc.cluster.local:8083']

  - job_name: zk-prover
    metrics_path: /health
    static_configs:
      - targets: ['zk-prover.aml-system.svc.cluster.local:8084']

  - job_name: regulator-api
    metrics_path: /health
    static_configs:
      - targets: ['regulator-api.aml-system.svc.cluster.local:8085']
