groups:
  - name: aml-service-alerts
    rules:
      - alert: EncryptionServiceDown
        expr: up{job="encryption-service"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: Encryption service unavailable
      - alert: ZkProverDown
        expr: up{job="zk-prover"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: ZK prover unavailable
      - alert: RegulatorApiDown
        expr: up{job="regulator-api"} == 0
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: Regulator API unavailable
